spring.application.name=Backend
spring.datasource.url=jdbc:postgresql://localhost:5432/HappyHomeDevelopersProjects
#spring.datasource.username=postgres
#spring.datasource.password=your_postgres_password
debug=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ── HikariCP connection pool ──────────────────────────────────────────────────
# Keep 5 idle connections ready; burst to 20 under load.
spring.datasource.hikari.pool-name=HappyHomePool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── Tomcat thread pool ────────────────────────────────────────────────────────
# 200 max worker threads; 10 kept warm. Drop connections after 5 s.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.connection-timeout=5s

# ── Actuator ──────────────────────────────────────────────────────────────────
# Expose only /actuator/health for load-balancer liveness probes.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins. Override via env var in production.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Firebase Admin SDK ────────────────────────────────────────────────────────
# Path to service-account JSON. Set FIREBASE_SERVICE_ACCOUNT_PATH env var in prod.
# Leave blank to fall back to Application Default Credentials (e.g. Cloud Run).
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:happyhomedevelopers-backend-firebase-adminsdk-fbsvc-b992280eb2.json}

# ── Gmail / Spring Mail ───────────────────────────────────────────────────────
# Use a Gmail App Password (not your real password).
# Generate one at: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin email that receives new-enquiry notifications.
app.notification.admin-email=${ADMIN_NOTIFICATION_EMAIL:yaswanthbopparaju@gmail.com}

# ── Google Sheets ─────────────────────────────────────────────────────────────
# Copy the sheet ID from the URL: docs.google.com/spreadsheets/d/<SHEET_ID>/edit
# Share the sheet with the service-account email (Editor access).
app.google.sheets.spreadsheet-id=${GOOGLE_SHEETS_ID:1kl4zCaohx5ZdremhMhyNP5ytoM4aaT273LnuX21u2Ck}
# Optional: tab name (leave blank to auto-detect first tab)
app.google.sheets.sheet-name=${GOOGLE_SHEETS_TAB:}
# Optional: columns used for append
app.google.sheets.column-range=${GOOGLE_SHEETS_RANGE:A:G}